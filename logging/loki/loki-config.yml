# Grafana Loki Configuration — Jepangku News
# https://grafana.com/docs/loki/latest/configuration/
#
# Storage: filesystem (bind mount), bukan S3 (irit biaya VPS).
# Retention: 7 hari — cukup untuk debugging, tidak penuh disk.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  path_prefix: /loki
  replication_factor: 1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

limits_config:
  # Retention log — 7 hari (168 jam)
  retention_period: 168h
  # Maks ukuran per baris log (100KB — cukup untuk JSON panjang)
  max_line_size: 100KB
  # Maks query yang bisa di-return (5000 baris)
  max_entries_limit_per_query: 5000
  # Rate limit ingestion
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  delete_request_store: filesystem

# Schema terbaru yang direkomendasikan untuk Loki
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

table_manager:
  retention_deletes_enabled: true
  retention_period: 168h

# Analytics dimatikan agar tidak call home
analytics:
  reporting_enabled: false
