name: import-thumbnails

on:
  workflow_dispatch:
    inputs:
      environment:
        description: VPS target
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          VPS_HOST="$(echo "$VPS_HOST" | tr -d ' \r\n')"
          VPS_PORT="$(echo "$VPS_PORT" | tr -d ' \r\n')"
          VPS_USER="$(echo "$VPS_USER" | tr -d ' \r\n')"
          test -n "$VPS_HOST" && test -n "$VPS_PORT" && test -n "$VPS_USER"

          install -m 700 -d ~/.ssh
          if [ -n "${VPS_SSH_KEY:-}" ] && [[ "$VPS_SSH_KEY" == -----BEGIN* ]]; then
            printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          elif [ -n "${VPS_SSH_KEY_B64:-}" ]; then
            echo "$VPS_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          else
            echo "::error::Set VPS_SSH_KEY or VPS_SSH_KEY_B64"
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run thumbnail import on VPS
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            DEPLOY_PATH="/opt/jepangku"
            ENV_TARGET="production"
          else
            DEPLOY_PATH="/opt/jepangku-staging"
            ENV_TARGET="staging"
          fi

          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s <<REMOTE
          set -euo pipefail
          export DEPLOY_PATH="${DEPLOY_PATH}"
          export ENV="${ENV_TARGET}"
          cd "\${DEPLOY_PATH}/portal-berita"
          git fetch origin dev
          git checkout dev
          git pull --ff-only origin dev
          bash prisma/seeder/vps-import-thumbnail-csv.sh
          REMOTE
