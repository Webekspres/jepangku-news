name: deploy

on:
  push:
    branches:
      - dev
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-portal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    environment: staging
    env:
      CI: true
      DB_USER: ci
      DB_PASSWORD: ci
      DATABASE_URL: postgresql://ci:ci@localhost:5432/jepangku_news_test?client_encoding=UTF8
      DATABASE_ADMIN_URL: postgresql://ci:ci@localhost:5432/postgres
      AUTH_PROVIDER: clerk
      NEXT_PUBLIC_AUTH_PROVIDER: clerk
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEWS_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      ADMIN_EMAIL: admin+clerk_test@jepangku.com
      CONTRIBUTOR_TEST_EMAIL: kontributor+clerk_test@jepangku.com
      R2_ACCOUNT_ID: ci
      R2_ACCESS_KEY_ID: ci
      R2_ACCESS_KEY_SECRET: ci
      R2_BUCKET_NAME: ci
      R2_PUBLIC_URL: https://example.com
      CORE_API_URL: http://localhost:8080
      CORE_SERVICE_TOKEN: ci-placeholder
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate Clerk test secrets
        run: |
          if [ -z "${{ secrets.CLERK_PUBLISHABLE_KEY }}" ] || [ -z "${{ secrets.CLERK_SECRET_KEY }}" ]; then
            echo "::error::CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY must be set in the staging environment."
            exit 1
          fi

      - run: bun install --frozen-lockfile
      - run: cp .env.test.example .env.test
      - run: bunx prisma generate
      - run: bun run lint

      - name: Prepare test database
        run: bun run test:db:prepare

      - name: Start Next.js (test env)
        run: |
          bun run dev:test > /tmp/next.log 2>&1 &
          echo $! > /tmp/next.pid
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Server ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Next.js failed to start within 3 minutes"
          tail -n 120 /tmp/next.log || true
          exit 1

      - name: Run unit + integration tests
        run: bun run test

      - name: Stop Next.js
        if: always()
        run: |
          if [ -f /tmp/next.pid ]; then
            kill "$(cat /tmp/next.pid)" 2>/dev/null || true
          fi

  build:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate Clerk build secret
        run: |
          if [ -z "${{ secrets.CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "::error::CLERK_PUBLISHABLE_KEY is empty. Add it to the staging environment secrets."
            exit 1
          fi

      - name: Resolve image tag
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version_tag=staging" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://portalinfo.jepangku.com
            NEXT_PUBLIC_API_URL=https://portalinfo.jepangku.com/api
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=https://portalinfo.jepangku.com/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=https://portalinfo.jepangku.com/sign-up
          tags: |
            ${{ steps.meta.outputs.image }}:staging
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:migrate-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      DEPLOY_PATH: /opt/jepangku-staging
      PORTAL_IMAGE_TAG: staging
      HEALTH_URL: http://127.0.0.1:3011/
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          VPS_HOST="$(echo "$VPS_HOST" | tr -d ' \r\n')"
          VPS_PORT="$(echo "$VPS_PORT" | tr -d ' \r\n')"
          VPS_USER="$(echo "$VPS_USER" | tr -d ' \r\n')"
          test -n "$VPS_HOST" && test -n "$VPS_PORT" && test -n "$VPS_USER"

          install -m 700 -d ~/.ssh
          if [ -n "${VPS_SSH_KEY:-}" ] && [[ "$VPS_SSH_KEY" == -----BEGIN* ]]; then
            printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          elif [ -n "${VPS_SSH_KEY_B64:-}" ]; then
            echo "$VPS_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          else
            echo "::error::Set VPS_SSH_KEY or VPS_SSH_KEY_B64 in staging environment"
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          echo "VPS_HOST=$VPS_HOST" >> "$GITHUB_ENV"
          echo "VPS_PORT=$VPS_PORT" >> "$GITHUB_ENV"
          echo "VPS_USER=$VPS_USER" >> "$GITHUB_ENV"

      - name: Deploy portal to staging VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          export DEPLOY_PATH="/opt/jepangku-staging"
          export PORTAL_IMAGE_TAG="staging"
          export HEALTH_URL="http://127.0.0.1:3011/"

          set -euo pipefail
          cd "$DEPLOY_PATH"

          set -a
          source .env
          set +a

          # 1) Always pull latest migrator image
          docker pull ghcr.io/webekspres/jepangku-news:migrate-staging
          
          # 2) Run migration
          docker run --rm \
            --network jepangku_staging_net \
            -e DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@jepangku_staging_db:5432/stg_jepangku_portal" \
            ghcr.io/webekspres/jepangku-news:migrate-staging
          
          # 3) Pull + start app
          docker compose pull portal-berita
          docker compose up -d --force-recreate portal-berita

          # 4) Wait for Next.js
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3011/ >/dev/null 2>&1; then
              echo "Health OK"
              break
            fi
            [ "$i" -eq 30 ] && { echo "Health check failed"; exit 1; }
            echo "Waiting for portal... ($i/30)"
            sleep 3
          done

          echo "Deploy OK: portal-berita @ staging"

          curl -fsS "$HEALTH_URL"
          echo "Deploy OK: portal-berita @ ${PORTAL_IMAGE_TAG}"
          REMOTE
